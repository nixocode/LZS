<footer class="site-footer" id="site-footer">
  <div class="container site-footer__inner">
    <div class="site-footer__brand">
      <svg class="site-footer__icon-svg" width="24" height="24" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 38c0 0 0-18 24-18s24 18 24 18" fill="var(--color-primary)" stroke="var(--color-primary-dark)" stroke-width="2.5" stroke-linecap="round"/>
        <rect x="4" y="36" width="56" height="8" rx="4" fill="var(--color-primary)" stroke="var(--color-primary-dark)" stroke-width="2.5"/>
        <path d="M14 36V28c0-10 8-16 18-16s18 6 18 16v8" stroke="var(--color-primary-dark)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M22 20c0 0 4-4 10-4s10 4 10 4" stroke="var(--color-primary-dark)" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M18 30c0-6 6-12 14-12" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      </svg>
      <span class="site-footer__title">{{ site.title }}</span>
      <p class="site-footer__tagline">{{ site.tagline }}</p>
    </div>

    <nav class="site-footer__nav" aria-label="Navegación del pie de página">
      <ul class="site-footer__list">
        <li><a href="{{ '/' | relative_url }}">Inicio</a></li>
        <li><a href="{{ '/blog/' | relative_url }}">Blog</a></li>
        <li><a href="{{ '/herramientas/' | relative_url }}">Herramientas</a></li>
        <li><a href="{{ '/sobre-nosotros/' | relative_url }}">Sobre nosotros</a></li>
        <li><a href="{{ '/contacto/' | relative_url }}">Contacto</a></li>
      </ul>
    </nav>

    <div class="site-footer__bottom">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. Todos los derechos reservados.</p>
      <p class="site-footer__rss">
        <a href="{{ '/feed.xml' | relative_url }}" aria-label="Feed RSS">
          RSS
        </a>
      </p>
    </div>
  </div>
</footer>
