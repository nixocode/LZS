<!DOCTYPE html>
<html lang="{{ site.lang | default: 'es' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 30 }}{% else %}{{ site.description }}{% endif %}">
  <meta name="author" content="{{ site.author.name }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 30 }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:locale" content="es_ES">

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% if page.url == '/' %}
  <link rel="stylesheet" href="{{ '/assets/css/scroll-animations.css' | relative_url }}">
  {% endif %}

  <!-- Feed RSS -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">

  {% seo %}
</head>
<body{% if page.url == '/' %} class="home-cinematic"{% endif %}>
  {% if page.url == '/' %}
  <div class="scroll-progress" aria-hidden="true"><div class="scroll-progress__bar"></div></div>
  <canvas class="dust-canvas" aria-hidden="true"></canvas>
  {% endif %}

  {% include header.html %}

  <main class="site-content" id="main-content">
    {{ content }}
  </main>

  <!-- Chart.js para gráficos interactivos -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  {% if page.url == '/' %}
  <script src="{{ '/assets/js/scroll-animations.js' | relative_url }}" defer></script>
  {% endif %}

  {% include footer.html %}
</body>
</html>
